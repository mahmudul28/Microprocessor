<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmable Interval Timer 8254</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        /* Smooth glowing transitions */
        .glow-active { box-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-100 font-sans selection:bg-blue-500/30">
    
    <!-- The React App will inject here -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const IconPlay = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconPause = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
        const IconActivity = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconZap = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconCpu = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>;
        const IconTerminal = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>;
        const IconInfo = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const IconCode = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
        const IconArrowRightCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line></svg>;
        const IconSettings = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconHash = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></svg>;
        const IconClock = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconHexagon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon></svg>;
        const CheckCircleIcon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const IconReset = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
        const IconSmartphone = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;

        const App = () => {
          // --- UI State ---
          const [activeTab, setActiveTab] = useState('generator'); // 'generator' or 'simulator'

          // --- Dynamic Generator State ---
          const [genCounter, setGenCounter] = useState(0); 
          const [genMode, setGenMode] = useState(3);       
          const [genBaseAddr, setGenBaseAddr] = useState('8000'); 
          
          const [calcMethod, setCalcMethod] = useState('freq'); 
          const [clockFreq, setClockFreq] = useState(2);
          const [clockUnit, setClockUnit] = useState(1e6); 
          const [targetTime, setTargetTime] = useState(50);
          const [timeUnit, setTimeUnit] = useState(1e-6); 
          const [targetFreq, setTargetFreq] = useState(1);
          const [freqUnit, setFreqUnit] = useState(1e3); 
          const [directN, setDirectN] = useState(100);
          const [bcdMode, setBcdMode] = useState(false);

          // --- Simulation State ---
          const [autoClock, setAutoClock] = useState(false);
          const [clockSpeed, setClockSpeed] = useState(350); 
          const PALETTE = ['#0ea5e9', '#f43f5e', '#a855f7', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6']; 

          const [state, setState] = useState({
            mode: 0, loadedCount: 5, count: -1, gate: true, clk: 0, wr: 1, out: 1, phase: 'HIGH', 
            counting: false, gateEdge: false, strobeActive: false, outColorIndex: 0, history: [], timeTick: 0, simNote: "",
            realN: 5, simClockHz: 1193182, // classic 8253/8254 PC/AT timer reference clock (1.193182 MHz)
            armed: false // true only after the CPU has actually written a Control Word + Count
          });
          // Mode selected in the "1. CPU" panel for the *next* Write — deliberately decoupled from
          // state.mode (which is the mode the chip is actually running right now). On real hardware,
          // picking a new mode does nothing until you WR a new control word + count; the old code let
          // the mode buttons mutate the live state.mode directly, which could desync the running
          // counter from its own mode (e.g. flipping to Mode 3 mid-count without reloading phase/count).
          const [pendingMode, setPendingMode] = useState(0);
          const stateRef = useRef(state);
          stateRef.current = state;

          // ==========================================
          // DYNAMIC MATH & CODE GENERATOR LOGIC
          // ==========================================
          
          let actualN = 0;
          let calcError = "";
          const clockHz = clockFreq * clockUnit;

          if (calcMethod === 'direct') {
            actualN = Math.round(directN);
          } else if (calcMethod === 'time') {
            const targetSec = targetTime * timeUnit;
            actualN = Math.round(clockHz * targetSec);
          } else if (calcMethod === 'freq') {
            const targHz = targetFreq * freqUnit;
            if (targHz > 0) actualN = Math.round(clockHz / targHz);
          }

          const maxN = bcdMode ? 9999 : 65535;
          if (actualN > maxN) calcError = `Calculated N (${actualN.toLocaleString()}) exceeds maximum ${bcdMode ? '4-digit BCD' : '16-bit binary'} value (${maxN.toLocaleString()}). ${bcdMode ? 'Switch to Binary mode or cascade counters.' : 'Cascading is required for this delay.'}`;
          if (actualN < 2 && calcError === "") calcError = `N must be at least 2 for the 8254 to function properly.`;

          const validN = Math.max(2, Math.min(actualN, maxN));
          const toBCDByte = (twoDigits) => ((Math.floor(twoDigits / 10) << 4) | (twoDigits % 10));

          let hexN, is16Bit, lsbHex, msbHex;
          if (bcdMode) {
            is16Bit = validN > 99;
            const lsbDigits = validN % 100;
            const msbDigits = Math.floor(validN / 100) % 100;
            lsbHex = toBCDByte(lsbDigits).toString(16).toUpperCase().padStart(2, '0');
            msbHex = is16Bit ? toBCDByte(msbDigits).toString(16).toUpperCase().padStart(2, '0') : "00";
            hexN = (is16Bit ? msbHex : "") + lsbHex; // display only
          } else {
            hexN = validN.toString(16).toUpperCase().padStart(2, '0');
            is16Bit = validN > 255;
            lsbHex = hexN.slice(-2).padStart(2, '0');
            msbHex = is16Bit ? hexN.slice(0, -2).padStart(2, '0') : "00";
          }

          const baseDec = parseInt(genBaseAddr, 16) || 32768; 
          const addrCnt0 = baseDec.toString(16).toUpperCase() + 'H';
          const addrCnt1 = (baseDec + 1).toString(16).toUpperCase() + 'H';
          const addrCnt2 = (baseDec + 2).toString(16).toUpperCase() + 'H';
          const addrCntr = (baseDec + 3).toString(16).toUpperCase() + 'H';
          
          const targetAddr = genCounter === 0 ? addrCnt0 : genCounter === 1 ? addrCnt1 : addrCnt2;
          const targetName = `CNT${genCounter}`;

          const scBits = genCounter === 0 ? "00" : genCounter === 1 ? "01" : "10";
          const rwBits = is16Bit ? "11" : "01";
          const mBits = genMode.toString(2).padStart(3, '0');
          const bcdBit = bcdMode ? "1" : "0";
          const cwBin = `${scBits}${rwBits}${mBits}${bcdBit}`;
          const cwHex = parseInt(cwBin, 2).toString(16).toUpperCase().padStart(2, '0') + 'H';

          const generatedMath = [
            `1. Hardware Addresses: Base=${genBaseAddr}H -> CNT0=${addrCnt0}, CNT1=${addrCnt1}, CNT2=${addrCnt2}, Control=${addrCntr}`,
            calcMethod === 'direct' ? `2. Count (N): User defined directly as ${validN} (decimal) ${bcdMode ? `-> packed BCD bytes ${msbHex}H/${lsbHex}H` : `-> ${hexN}H`}` :
            calcMethod === 'time' ? `2. Count (N): (Clock Freq) * (Target Time) = ${clockHz.toLocaleString(undefined, {maximumFractionDigits: 3})} Hz * ${(targetTime * timeUnit).toFixed(6)} s = ${actualN} ${bcdMode ? `-> packed BCD bytes ${msbHex}H/${lsbHex}H` : `-> ${hexN}H`}` :
            `2. Count (N): (Clock Freq) / (Target Freq) = ${clockHz.toLocaleString(undefined, {maximumFractionDigits: 3})} Hz / ${(targetFreq * freqUnit).toLocaleString(undefined, {maximumFractionDigits: 3})} Hz = ${actualN} ${bcdMode ? `-> packed BCD bytes ${msbHex}H/${lsbHex}H` : `-> ${hexN}H`}`,
            `3. Mode Selection: Counter ${genCounter} operating in Mode ${genMode}.`,
            `4. Load Size: N is ${validN}${bcdMode ? ' (BCD)' : ''}. This requires a ${is16Bit ? '16-bit (LSB then MSB)' : '8-bit (LSB only)'} load.`,
            `5. Control Word: SC=${scBits}, RW=${rwBits}, M=${mBits}, BCD=${bcdBit} -> Bin: ${cwBin} -> Hex: ${cwHex}${bcdMode ? ' (BCD counting mode)' : ' (binary counting mode)'}`
          ];

          let generatedCode = `    ; --- HARDWARE SETUP ---\n    ${targetName}  EQU ${targetAddr}\n    CNTR  EQU ${addrCntr}\n    \n    ; --- INITIALIZE MANAGER ---\n    MOV AL, ${cwHex}      ; CW: Counter ${genCounter}, Mode ${genMode}, ${is16Bit ? '16-bit' : '8-bit'}\n    OUT CNTR, AL\n    \n    ; --- LOAD COUNTER ---\n    MOV AL, ${lsbHex}H      ; Load LSB of Count\n    OUT ${targetName}, AL`;
            
          if (is16Bit) {
            generatedCode += `\n    MOV AL, ${msbHex}H      ; Load MSB of Count\n    OUT ${targetName}, AL`;
          }
          generatedCode += `\n    ; Counter ${genCounter} is now armed!`;


          // ==========================================
          // SIMULATOR LOGIC
          // ==========================================
          const simulateCPUWrite = (mode, countValue, note = "", realNOverride = null, clockHzOverride = null) => {
            let out = 1; let counting = false; let count = countValue; let phase = 'HIGH';
            if (mode === 0) { out = 0; counting = true; } 
            else if (mode === 1) { out = 1; counting = false; } 
            else if (mode === 2) { out = 1; counting = true; } 
            else if (mode === 3) { out = 1; phase = 'HIGH'; count = Math.ceil(countValue / 2); counting = true; } 
            else if (mode === 4) { out = 1; counting = true; } 
            else if (mode === 5) { out = 1; counting = false; }

            const tick = stateRef.current.timeTick;
            const baseHist = stateRef.current.history;
            const nextColorIndex = (stateRef.current.outColorIndex + 1) % PALETTE.length;

            const newHist = [
              ...baseHist,
              { time: tick+1, clk: stateRef.current.clk, gate: stateRef.current.gate ? 1 : 0, wr: 0, out: stateRef.current.out, colorIndex: nextColorIndex },
              { time: tick+2, clk: stateRef.current.clk, gate: stateRef.current.gate ? 1 : 0, wr: 1, out: out, colorIndex: nextColorIndex }
            ].slice(-40);

            setState({
              ...stateRef.current, mode, loadedCount: countValue, count, out, phase, counting,
              strobeActive: false, gateEdge: false, wr: 1, outColorIndex: nextColorIndex, history: newHist, timeTick: tick + 2, simNote: note,
              realN: realNOverride !== null ? realNOverride : countValue,
              simClockHz: clockHzOverride !== null ? clockHzOverride : stateRef.current.simClockHz,
              armed: true
            });
          };

          const handleClockPulse = () => {
            const s = stateRef.current;
            if (!s.armed) return; // chip hasn't been configured yet — CLK does nothing observable
            let nextClk = s.clk === 0 ? 1 : 0;
            let { count: nextCount, out: nextOut, counting: nextCounting, gateEdge: nextGateEdge, phase: nextPhase, strobeActive: nextStrobe } = s;

            if (nextClk === 0 && s.count !== -1) {
              if (nextStrobe) {
                nextOut = 1; nextStrobe = false;
                if (s.mode === 4 || s.mode === 5) nextCounting = false;
              }
              switch (s.mode) {
                case 0:
                  if (s.gate && nextCounting) { nextCount--; if (nextCount <= 0) { nextOut = 1; nextCounting = false; } } break;
                case 1:
                  if (nextGateEdge) { nextCount = s.loadedCount; nextCounting = true; nextOut = 0; nextGateEdge = false; } 
                  else if (nextCounting) { nextCount--; if (nextCount <= 0) { nextOut = 1; nextCounting = false; } } break;
                case 2:
                  if (s.gate) { nextCount--; if (nextCount === 1) nextOut = 0; else if (nextCount <= 0) { nextCount = s.loadedCount; nextOut = 1; } else nextOut = 1; } break;
                case 3:
                  if (s.gate) {
                    nextCount--;
                    if (nextCount <= 0) {
                      nextPhase = s.phase === 'HIGH' ? 'LOW' : 'HIGH'; nextOut = nextPhase === 'HIGH' ? 1 : 0;
                      if (nextPhase === 'HIGH') nextCount = Math.ceil(s.loadedCount / 2); else nextCount = Math.floor(s.loadedCount / 2);
                    }
                  } break;
                case 4:
                  if (s.gate && nextCounting && !nextStrobe) { nextCount--; if (nextCount === 0) { nextOut = 0; nextStrobe = true; } } break;
                case 5:
                  if (nextGateEdge) { nextCount = s.loadedCount; nextCounting = true; nextGateEdge = false; nextOut = 1; } 
                  else if (nextCounting && !nextStrobe) { nextCount--; if (nextCount === 0) { nextOut = 0; nextStrobe = true; } } break;
                default: break;
              }
            }
            const nextTimeTick = s.timeTick + 1;
            const newHistory = [...s.history, { time: nextTimeTick, clk: nextClk, gate: s.gate ? 1 : 0, wr: s.wr, out: nextOut, colorIndex: s.outColorIndex }].slice(-40);
            setState({ ...s, clk: nextClk, count: nextCount, out: nextOut, phase: nextPhase, counting: nextCounting, gateEdge: nextGateEdge, strobeActive: nextStrobe, history: newHistory, timeTick: nextTimeTick });
          };

          useEffect(() => {
            let interval; if (autoClock) interval = setInterval(handleClockPulse, clockSpeed); return () => clearInterval(interval);
          }, [autoClock, clockSpeed]);

          const handleGateToggle = () => {
            const s = stateRef.current;
            if (!s.armed) { setState({ ...s, gate: !s.gate }); return; } // just flip the pin, no side effects yet
            const newGate = !s.gate;
            const risingEdge = (!s.gate && newGate);
            const fallingEdge = (s.gate && !newGate);
            
            // Advance color cleanly on rising edge so the NEW wave chunk gets the NEW color.
            const nextColorIndex = risingEdge ? (s.outColorIndex + 1) % PALETTE.length : s.outColorIndex;

            let nextOut = s.out;
            let nextCount = s.count;
            let nextPhase = s.phase;
            let nextGateEdge = s.gateEdge;

            if ((s.mode === 2 || s.mode === 3) && s.count !== -1) {
              if (fallingEdge) {
                nextOut = 1;
              } else if (risingEdge) {
                nextCount = s.mode === 3 ? Math.ceil(s.loadedCount / 2) : s.loadedCount;
                nextPhase = 'HIGH';
              }
            }

            if ((s.mode === 1 || s.mode === 5) && risingEdge) {
              nextGateEdge = true;
            }

            setState({ ...s, gate: newGate, gateEdge: nextGateEdge, outColorIndex: nextColorIndex, out: nextOut, count: nextCount, phase: nextPhase });
          };

          const handleManualWrite = (e) => {
            e.preventDefault();
            const val = parseInt(e.target.elements.simCountVal.value, 10);
            if (!(val >= 2)) return;
            let visualN = val;
            let note = "Manual Configuration Loaded.";
            if (val > 24) {
              visualN = pendingMode === 3 ? 14 : 10;
              note = `Scale Magic Applied: N=${val.toLocaleString()} scaled down to ${visualN} for visual demonstration.`;
            }
            simulateCPUWrite(pendingMode, visualN, note, val, state.simClockHz);
          };
          
          const handleReset = () => {
             setAutoClock(false);
             setState({
                 ...stateRef.current,
                 count: -1,
                 clk: 0,
                 wr: 1,
                 out: 1,
                 phase: 'HIGH',
                 counting: false,
                 gateEdge: false,
                 strobeActive: false,
                 outColorIndex: 0,
                 history: [],
                 timeTick: 0,
                 simNote: "Simulation Reset to idle.",
                 armed: false
             });
          };

          const loadDynamicToSimulator = () => {
            if (calcError) return; // Prevent load if error exists
            
            let visualN = validN;
            let note = `Simulation Deployed: Mode ${genMode}, N=${validN}.`;
            
            if (validN > 24) {
              visualN = genMode === 3 ? 14 : 10; 
              note = `Scale Magic Applied: N= ${validN.toLocaleString()} scaled down to ${visualN} for visual demonstration.`;
            }

            setAutoClock(false);
            setActiveTab('simulator');
            setPendingMode(genMode);
            simulateCPUWrite(genMode, visualN, note, validN, clockHz);
          };

          const renderWaveform = (dataKey, baseColor, label) => {
            if (state.history.length === 0) return null;
            const svgWidth = 700; const svgHeight = 60; const padding = 12; const stepX = svgWidth / 40; 
            const paths = []; let currentPathD = "";
            let currentColor = dataKey === 'out' ? PALETTE[state.history[0].colorIndex || 0] : baseColor;

            state.history.forEach((point, index) => {
              const x = index * stepX; const y = point[dataKey] === 1 ? padding : svgHeight - padding;
              const pointColor = dataKey === 'out' ? PALETTE[point.colorIndex || 0] : baseColor;

              if (index === 0) { currentPathD += `M ${x} ${y}`; currentColor = pointColor; } 
              else {
                const prevX = (index - 1) * stepX;
                const prevY = state.history[index - 1][dataKey] === 1 ? padding : svgHeight - padding;
                
                // Color changed! Draw up to this X with OLD color, then start NEW color
                if (pointColor !== currentColor && dataKey === 'out') {
                  currentPathD += ` L ${x} ${prevY}`; // Finish horizontal line
                  paths.push({ d: currentPathD, color: currentColor }); // Commit path
                  
                  // Start new path exactly where we left off, drop vertically, then continue
                  currentPathD = `M ${x} ${prevY} L ${x} ${y}`; 
                  currentColor = pointColor;
                } else { 
                  currentPathD += ` L ${x} ${prevY} L ${x} ${y}`; 
                }
              }
            });
            if (currentPathD) paths.push({ d: currentPathD, color: currentColor });

            return (
              <div className="flex items-center gap-4 mb-3 relative">
                <div className="w-16 font-bold text-gray-300 text-right text-[11px] uppercase tracking-wider">{label}</div>
                <svg width="100%" height={svgHeight} className="bg-[#050505] rounded-xl border border-gray-800 shadow-inner" viewBox={`0 0 ${svgWidth} ${svgHeight}`} preserveAspectRatio="none">
                  {/* Grid Lines */}
                  <line x1="0" y1={padding} x2={svgWidth} y2={padding} stroke="#374151" strokeWidth="1" strokeDasharray="3 5" />

                              <div className="text-[10px] text-gray-400 uppercase tracking-widest mb-1.5 font-bold">Internal Counter</div>
                              <div className="text-5xl font-mono text-red-500 font-bold bg-black px-2 py-4 rounded-lg border-[3px] border-gray-900 shadow-inner tracking-widest relative overflow-hidden">
                                <div className="absolute inset-0 bg-[linear-gradient(rgba(255,0,0,0.08)_50%,transparent_50%)] bg-[length:100%_4px] pointer-events-none"></div>
                                <span className="drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]">
                                  {state.count === -1 ? "--" : Math.max(0, state.count).toString().padStart(2, '0')}
                                </span>
                              </div>
                              {state.mode === 3 && state.count !== -1 && (
                                 <div className="text-xs text-cyan-400 mt-3 font-mono font-bold tracking-widest drop-shadow-[0_0_5px_rgba(34,211,238,0.6)]">PHASE: {state.phase}</div>
                              )}
                            </div>

                            {/* Pins */}
                            <div className="absolute left-[-24px] top-32 flex items-center">
                              <div className={`w-6 h-2.5 rounded-l-sm transition-all duration-100 ${state.clk ? 'bg-yellow-400 shadow-[0_0_12px_#facc15]' : 'bg-gray-700'}`}></div>
                              <div className="ml-3 text-xs font-bold text-gray-300 font-mono tracking-wider">CLK</div>
                            </div>
                            <div className="absolute left-[-24px] top-48 flex items-center">
                              <div className={`w-6 h-2.5 rounded-l-sm transition-all duration-200 ${state.gate ? 'bg-green-400 shadow-[0_0_12px_#4ade80]' : 'bg-gray-700'}`}></div>
                              <div className="ml-3 text-xs font-bold text-gray-300 font-mono tracking-wider">GATE</div>
                            </div>
                            <div className="absolute right-[-24px] top-40 flex items-center flex-row-reverse">
                              <div className={`w-6 h-2.5 rounded-r-sm shadow-[0_0_15px_currentColor] transition-colors duration-300`} style={{ backgroundColor: PALETTE[state.outColorIndex], color: PALETTE[state.outColorIndex], boxShadow: `0 0 15px ${PALETTE[state.outColorIndex]}` }}></div>
                              <div className="mr-3 text-xs font-bold text-gray-300 font-mono tracking-wider">OUT</div>
                            </div>
                          </div>

                          <div className="w-full mt-8 grid grid-cols-2 gap-4">
                            <button onClick={handleGateToggle} className={`py-4 rounded-xl font-bold border-[3px] font-mono text-sm transition-all duration-300 active:scale-95 shadow-lg ${state.gate ? 'bg-green-900/40 border-green-500 text-green-400 shadow-green-900/50' : 'bg-gray-950/80 border-gray-700 text-gray-500'}`}>
                              GATE: {state.gate ? '1 (ON)' : '0 (OFF)'}
                            </button>
                            <div className="flex gap-2">
                              <button onClick={handleClockPulse} disabled={autoClock || !state.armed} title={!state.armed ? "Write a Count first — the chip isn't configured yet" : "Advance one CLK pulse"} className="flex-1 bg-gray-800 hover:bg-gray-700 disabled:opacity-50 disabled:hover:bg-gray-800 border border-gray-600 rounded-xl text-yellow-400 font-bold font-mono text-sm transition-all duration-200 shadow-lg active:scale-95">CLK Step</button>
                              
                              <button onClick={() => setAutoClock(!autoClock)} disabled={!state.armed} title={!state.armed ? "Write a Count first — the chip isn't configured yet" : "Play/Pause"} className={`w-12 flex justify-center items-center rounded-xl transition-all duration-300 shadow-lg active:scale-95 disabled:opacity-50 ${autoClock ? 'bg-red-600 hover:bg-red-500 text-white shadow-red-900/50' : 'bg-gray-700 hover:bg-gray-600 text-white'}`}>
                                {autoClock ? <IconPause className="w-5 h-5"/> : <IconPlay className="w-5 h-5"/>}
                              </button>
                              
                              <button onClick={handleReset} title="Reset Timer" className="w-12 bg-gray-800 hover:bg-red-900/80 border border-gray-600 hover:border-red-500 text-gray-400 hover:text-red-400 flex justify-center items-center rounded-xl transition-all duration-300 shadow-lg active:scale-95">
                                <IconReset className="w-5 h-5"/>
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* Right Panel: Scope & Summary */}
                      <div className="lg:col-span-8 flex flex-col gap-6">
                        
                        {/* Logic Analyzer */}
                        <div className="bg-[#050505] p-6 rounded-2xl border border-gray-800 shadow-2xl relative overflow-hidden flex-1 flex flex-col">
                          <div className="absolute top-0 right-0 p-6 opacity-20 pointer-events-none"><IconActivity className="w-32 h-32 text-blue-500" /></div>
                          
                          <div className="flex justify-between items-center mb-8 relative z-10">
                            <h2 className="text-xl font-semibold text-gray-100 flex items-center gap-3">
                              <IconActivity className="w-6 h-6 text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.6)]" /> 2. Live Logic Analyzer
                            </h2>
                            <div className="text-xs bg-gray-900/80 backdrop-blur px-4 py-2 rounded-lg text-gray-300 border border-gray-700 font-mono hidden md:flex items-center gap-2 shadow-inner">
                              💡 Tip: <span className="font-bold drop-shadow-md" style={{color: PALETTE[state.outColorIndex]}}>OUT color</span> changes on GATE rising edge or WR pulse
                            </div>
                          </div>
                          
                          <div className="w-full relative z-10 overflow-x-auto pb-4 flex-1">
                            <div className="min-w-[600px] space-y-2">
                              {renderWaveform('wr', '#3b82f6', 'WR (CPU)')}
                              {renderWaveform('clk', '#facc15', 'CLK')}
                              {renderWaveform('gate', '#4ade80', 'GATE')}
                              {renderWaveform('out', PALETTE[0], 'OUT')}
                            </div>
                          </div>
                          
                          {state.history.length === 0 && (
                            <div className="absolute inset-0 flex items-center justify-center bg-black/70 backdrop-blur-sm z-20 transition-all duration-500">
                               <div className="text-center p-6 bg-gray-900/90 rounded-2xl border border-gray-700 shadow-2xl transform scale-105">
                                 <p className="text-gray-200 font-bold text-lg mb-2">Awaiting Instructions...</p>
                                 <p className="text-gray-400 text-sm">Use the CPU Panel on the left to write a Count and Mode to the timer.</p>
                               </div>
                            </div>
                          )}
                        </div>

                        {/* Live Metrics */}
                        {(() => {
                          const m = computeLiveMetrics();
                          if (!m) return null;
                          return (
                            <div className="bg-gray-900/80 backdrop-blur border border-gray-700/60 p-6 rounded-2xl shadow-xl">
                              <h3 className="text-xs font-bold text-cyan-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                                <IconActivity className="w-4 h-4" /> Live Metrics <span className="text-gray-500 normal-case font-normal">— @ {formatFreq(state.simClockHz)} clock, N={(state.realN || state.loadedCount).toLocaleString()}</span>
                              </h3>
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-gray-950/60 border border-gray-800 rounded-xl p-4">
                                  <div className="text-[10px] text-gray-500 uppercase tracking-wider mb-1">{m.label}</div>
                                  <div className="text-xl font-mono font-bold text-cyan-300">{formatTime(m.period)}</div>
                                </div>
                                <div className="bg-gray-950/60 border border-gray-800 rounded-xl p-4">
                                  <div className="text-[10px] text-gray-500 uppercase tracking-wider mb-1">Output Frequency</div>
                                  <div className="text-xl font-mono font-bold text-emerald-300">{m.freq ? formatFreq(m.freq) : 'N/A (one-shot)'}</div>
                                </div>
                                <div className="bg-gray-950/60 border border-gray-800 rounded-xl p-4">
                                  <div className="text-[10px] text-gray-500 uppercase tracking-wider mb-1">Duty Cycle</div>
                                  <div className="text-xl font-mono font-bold text-purple-300">{m.duty !== null ? m.duty.toFixed(1) + '%' : 'N/A'}</div>
                                </div>
                              </div>
                            </div>
                          );
                        })()}

                        {/* Educational Summary */}
                        <div className="bg-gray-900/80 backdrop-blur border border-gray-700/60 p-6 rounded-2xl shadow-xl flex gap-5 items-start">
                          <div className="p-3 bg-blue-900/30 rounded-xl shrink-0 shadow-inner"><IconInfo className="w-7 h-7 text-blue-400" /></div>
                          <div>
                            <h3 className="text-blue-400 font-bold mb-3 uppercase tracking-wider text-sm">Mode {state.mode} Operation Summary</h3>
                            <div className="text-gray-200 text-sm leading-relaxed space-y-2">
                              {state.mode === 0 && <p><strong>Interrupt on Terminal Count:</strong> OUT drops LOW when you write the count. It counts down on falling CLK edges. OUT goes HIGH to interrupt the CPU the moment it hits 0.</p>}
                              {state.mode === 1 && <p><strong>Hardware Retriggerable One-Shot:</strong> Writing the count does NOT start it. It is waiting for a Rising Edge on GATE (0 -{'>'} 1). OUT drops LOW for the entire count duration.</p>}
                              {state.mode === 2 && <p><strong>Rate Generator:</strong> Acts as a continuous loop. It fires a fast LOW strobe on OUT when the count hits 1, then automatically reloads the original N value.</p>}
                              {state.mode === 3 && <p><strong>Square Wave Generator:</strong> Creates a symmetric wave. OUT stays HIGH for half the count, and LOW for the other half. It auto-reloads.</p>}
                              {state.mode === 4 && <p><strong>Software Triggered Strobe:</strong> Triggers immediately upon the WR pulse. OUT stays HIGH, then drops LOW for exactly one clock cycle when it hits zero.</p>}
                              {state.mode === 5 && <p><strong>Hardware Triggered Strobe:</strong> Waits for a GATE hardware trigger (0 -{'>'} 1) to start counting. OUT stays HIGH, firing a 1-cycle LOW strobe at zero.</p>}
                            </div>
                          </div>
                        </div>
                      </div>

                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
